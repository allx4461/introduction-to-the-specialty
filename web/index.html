<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ASCII Aquarium</title>
    <style>
        body { 
            background-color: #050505; 
            color: #00ff00; 
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding-top: 20px;
        }
        #aquarium { 
            background: #000;
            padding: 20px;
            border: 2px solid #333;
            white-space: pre; 
            margin-bottom: 20px;
            min-height: 300px;
        }
        .controls { 
            margin-bottom: 20px; 
            display: flex;
            gap: 10px;
        }
        button { padding: 8px 15px; cursor: pointer; background: #222; color: white; border: 1px solid #444; font-family: 'Courier New', monospace; }
        button:hover { background: #444; }
        .flush-btn {
            background: #600;
            border-color: #900;
            color: #ff8888;
        }
        .flush-btn:hover {
            background: #900;
        }
        #chat-container {
            width: 600px;
            border: 2px solid #333;
            background: #000;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-sizing: border-box;
        }
        #chat-box {
            height: 250px;
            overflow-y: auto;
            border: 1px solid #222;
            background: #050505;
            padding: 10px;
            text-align: left;
        }
        .chat-message {
            margin-bottom: 8px;
            word-break: break-all;
        }
        .chat-username {
            color: #00ff00;
            font-weight: bold;
        }
        .chat-text {
            color: #ffffff;
        }
        .chat-input-row {
            display: flex;
            gap: 10px;
        }
        .chat-input-row input[type="text"] {
            background: #111;
            color: #00ff00;
            border: 1px solid #444;
            padding: 8px;
            font-family: 'Courier New', monospace;
        }
        #chat-username {
            width: 150px;
        }
        #chat-text {
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="addFish('1')">Fish 1</button>
        <button onclick="addFish('2')">Fish 2</button>
        <button onclick="addFish('3')">Fish 3</button>
        <button onclick="addFish('4')">Fish 4</button>
        <button onclick="addFish('5')">Fish 5</button>
        <button onclick="flushAquarium()" class="flush-btn">Flush</button>
    </div>

    <pre id="aquarium">...</pre>

    <div id="chat-container">
        <div id="chat-box"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-username" placeholder="Name (or anonymous)">
            <input type="text" id="chat-text" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        
        const host = window.location.hostname || 'localhost';

        async function updateAquarium() {
            try {
                const response = await fetch(`http://${host}:8080/get_frame`);
                const text = await response.text();
                document.getElementById('aquarium').innerHTML = text;
            } catch (e) {
                document.getElementById('aquarium').innerText = "Error: C++ server is not responding";
            }
        }

        async function addFish(id) {
            try {
                await fetch(`http://${host}:8080/add_fish${id}`);
            } catch (e) {
                console.error("Failed to add fish", e);
            }
        }

        async function flushAquarium() {
            try {
                await fetch(`http://${host}:8080/clear`);
            } catch (e) {
                console.error("Failed to flush aquarium", e);
            }
        }

        async function sendMessage() {
            const usernameInput = document.getElementById('chat-username');
            const textInput = document.getElementById('chat-text');

            const username = usernameInput.value.trim() || 'Anonymous';
            const text = textInput.value.trim();

            if (!text) return;

            try {
                const response = await fetch(`http://${host}:5000/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, text })
                });
                if (response.ok) {
                    textInput.value = '';
                    updateMessages();
                }
            } catch (e) {
                console.error("Failed to send message", e);
            }
        }

        async function updateMessages() {
            try {
                const response = await fetch(`http://${host}:5000/messages`);
                const data = await response.json();
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = '';
                
                data.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'chat-message';

                    const userSpan = document.createElement('span');
                    userSpan.className = 'chat-username';
                    userSpan.textContent = msg.username + ": ";

                    const textSpan = document.createElement('span');
                    textSpan.className = 'chat-text';
                    textSpan.textContent = msg.text;

                    div.appendChild(userSpan);
                    div.appendChild(textSpan);
                    chatBox.appendChild(div);
                });
                
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                console.error("Failed to update chat", e);
            }
        }

        setInterval(updateAquarium, 100);
        setInterval(updateMessages, 2000);
        updateMessages();
    </script>
</body>
</html>
