<!DOCTYPE html>
<html>
<head>
    <title>aquarium</title>
    <style>
        body { 
            background-color: #050505; 
            color: #00ff00; 
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding-top: 20px;
        }
        #aquarium { 
            background: #000;
            padding: 20px;
            border: 2px solid #333;
            white-space: pre; 
            margin-bottom: 20px;
            min-height: 300px;
        }
        .controls { margin-bottom: 20px; }
        button { padding: 8px 15px; cursor: pointer; background: #222; color: white; border: 1px solid #444; }
        button:hover { background: #444; }
        #excuse-box {
            color: #ffcc00;
            font-style: italic;
            max-width: 600px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="addFish('1')">Fish 1</button>
        <button onclick="addFish('2')">Fish 2</button>
        <button onclick="addFish('3')">Fish 3</button>
    </div>

    <pre id="aquarium">...</pre>

    <div id="excuse-box">...</div>

    <script>
        
        async function updateAquarium() {
            try {
                const response = await fetch('http://185.189.14.184:8080/get_frame');
                const text = await response.text();
                document.getElementById('aquarium').innerHTML = text;
            } catch (e) {
                document.getElementById('aquarium').innerText = "Ошибка: C++ сервер не отвечает";
            }
        }


        async function addFish(id) {
            await fetch(`http://185.189.14.184:8080/add_fish${id}`);
        }

        
        async function updateExcuse() {
            try {
                const response = await fetch('http://185.189.14.184:5000/excuse');
                const data = await response.json();
                document.getElementById('excuse-box').innerText = "Оправдание дня: " + data.excuse;
            } catch (e) {
                document.getElementById('excuse-box').innerText = "Python-сервис отдыхает...";
            }
        }

        
        setInterval(updateAquarium, 100);
        setInterval(updateExcuse, 10000);
        updateExcuse();
    </script>
</body>
</html>
